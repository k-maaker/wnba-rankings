name: Update WNBA rankings

on:
  schedule:
    # 09:00 UTC = 5:00 AM Eastern during daylight time (the entire WNBA season).
    - cron: "0 9 * * *"
  workflow_dispatch: {}   # manual "Run workflow" button

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install numpy pandas openpyxl

      - name: Fetch results & lines, rebuild rankings
        run: python wnba_rankings.py

      - name: Commit updated data and page
        run: |
          git config user.name "rankings-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ docs/
          git diff --cached --quiet || git commit -m "Rankings update $(date -u +%F)"
          git push
