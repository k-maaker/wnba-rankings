name: Update WNBA rankings

on:
  schedule:
    # 11:00 UTC = 7:00 AM Eastern (daylight time) — after BigDataBall's ~5 AM drop.
    - cron: "0 11 * * *"
  workflow_dispatch: {}   # manual "Run workflow" button

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install numpy pandas openpyxl

      - name: Pull latest BigDataBall file from Dropbox
        env:
          DROPBOX_FOLDER_URL: ${{ secrets.DROPBOX_FOLDER_URL }}
        run: python fetch_bigdataball.py

      - name: Fetch results & lines, rebuild rankings
        run: python wnba_rankings.py

      - name: Commit updated data and page
        run: |
          git config user.name "rankings-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ docs/
          git diff --cached --quiet || git commit -m "Rankings update $(date -u +%F)"
          git push
